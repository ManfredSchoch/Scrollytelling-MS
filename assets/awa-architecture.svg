<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 505" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Schematic of a GenAI-based multi-agent system: a workflow step is handled by coordinated agents with access to external data and tools; each agent perceives, remembers, and acts on top of a foundation model, embedded in the enterprise environment">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8f8fa3"/>
    </marker>
    <marker id="arrw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#d97e00"/>
    </marker>
    <g id="agent">
      <circle r="30" fill="#5570e0"/>
      <circle cx="-9" cy="-6" r="4" fill="#ffffff"/>
      <circle cx="9" cy="-6" r="4" fill="#ffffff"/>
      <rect x="-11" y="7" width="22" height="5" rx="2.5" fill="#ffffff" opacity="0.9"/>
      <line x1="0" y1="-30" x2="0" y2="-40" stroke="#5570e0" stroke-width="3"/>
      <circle cy="-43" r="4" fill="#d97e00"/>
    </g>
  </defs>

  <!-- Workflow strip -->
  <text x="40" y="46" font-size="15" font-weight="700" fill="#15151d">A workflow with AI agents</text>
  <g font-size="15" fill="#4a4a58">
    <rect x="40" y="60" width="46" height="40" rx="9" fill="none" stroke="#8f8fa3" stroke-dasharray="5 4" stroke-width="1.5"/>
    <text x="63" y="85" text-anchor="middle">1</text>
    <line x1="86" y1="80" x2="126" y2="80" stroke="#8f8fa3" stroke-dasharray="5 4" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="128" y="60" width="46" height="40" rx="9" fill="rgba(37,71,208,0.08)" stroke="#2547d0" stroke-width="2"/>
    <text x="151" y="85" text-anchor="middle" fill="#2547d0" font-weight="700">2</text>
    <line x1="174" y1="80" x2="214" y2="80" stroke="#8f8fa3" stroke-dasharray="5 4" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="228" y="86" font-size="17" fill="#8f8fa3">…</text>
    <line x1="250" y1="80" x2="290" y2="80" stroke="#8f8fa3" stroke-dasharray="5 4" stroke-width="1.5" marker-end="url(#arr)"/>
    <rect x="292" y="60" width="46" height="40" rx="9" fill="none" stroke="#8f8fa3" stroke-dasharray="5 4" stroke-width="1.5"/>
    <text x="315" y="85" text-anchor="middle">n</text>
  </g>
  <!-- zoom from step 2 into the MAS box -->
  <line x1="132" y1="100" x2="48" y2="132" stroke="#c9c9dc" stroke-width="1.4"/>
  <line x1="170" y1="100" x2="432" y2="132" stroke="#c9c9dc" stroke-width="1.4"/>

  <!-- Multi-agent system box -->
  <rect x="40" y="134" width="400" height="330" rx="16" fill="rgba(37,71,208,0.06)" stroke="#2547d0" stroke-width="1.6"/>
  <text x="240" y="168" text-anchor="middle" font-size="18" font-weight="700" fill="#15151d">Multi-agent system</text>
  <circle cx="240" cy="286" r="86" fill="none" stroke="#2547d0" stroke-width="1.4" stroke-dasharray="6 6" opacity="0.65"/>
  <use href="#agent" x="150" y="252"/>
  <use href="#agent" x="330" y="252"/>
  <use href="#agent" x="240" y="352"/>
  <!-- external data & tools -->
  <rect x="92" y="408" width="296" height="36" rx="9" fill="#ffffff" stroke="#dcd9d0" stroke-width="1.4"/>
  <text x="240" y="431" text-anchor="middle" font-size="14" fill="#4a4a58">External data sources &amp; tools</text>
  <line x1="150" y1="402" x2="150" y2="300" stroke="#8f8fa3" stroke-width="1.6" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="330" y1="402" x2="330" y2="300" stroke="#8f8fa3" stroke-width="1.6" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- zoom lines: one agent = the detail circle -->
  <line x1="360" y1="240" x2="588" y2="216" stroke="#c9c9dc" stroke-width="1.4"/>
  <line x1="360" y1="264" x2="588" y2="446" stroke="#c9c9dc" stroke-width="1.4"/>

  <!-- Enterprise environment -->
  <rect x="590" y="30" width="340" height="62" rx="12" fill="#ffffff" stroke="#dcd9d0" stroke-width="1.4"/>
  <text x="760" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#15151d">Enterprise environment</text>
  <line x1="690" y1="100" x2="690" y2="172" stroke="#8f8fa3" stroke-width="1.6" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <line x1="830" y1="100" x2="830" y2="172" stroke="#8f8fa3" stroke-width="1.6" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- AI agent detail -->
  <circle cx="760" cy="332" r="155" fill="rgba(21,21,29,0.045)" stroke="#dcd9d0" stroke-width="1.5"/>
  <text x="760" y="216" text-anchor="middle" font-size="18" font-weight="700" fill="#15151d">AI agent</text>
  <circle cx="760" cy="352" r="62" fill="rgba(217,126,0,0.14)" stroke="#d97e00" stroke-width="1.6"/>
  <text x="760" y="348" text-anchor="middle" font-size="14.5" font-weight="600" fill="#15151d">Foundation</text>
  <text x="760" y="366" text-anchor="middle" font-size="14.5" font-weight="600" fill="#15151d">model</text>
  <!-- perceive / remember / act cycle -->
  <path d="M 682 316 A 86 86 0 0 1 757 266" fill="none" stroke="#d97e00" stroke-width="2" marker-end="url(#arrw)"/>
  <path d="M 800 274 A 86 86 0 0 1 845 366" fill="none" stroke="#d97e00" stroke-width="2" marker-end="url(#arrw)"/>
  <path d="M 826 415 A 86 86 0 0 1 690 400" fill="none" stroke="#d97e00" stroke-width="2" marker-end="url(#arrw)"/>
  <text x="646" y="290" text-anchor="middle" font-size="14" fill="#4a4a58">Perceive</text>
  <text x="838" y="252" text-anchor="middle" font-size="14" fill="#4a4a58">Remember</text>
  <text x="796" y="452" text-anchor="middle" font-size="14" fill="#4a4a58">Act</text>
</svg>
